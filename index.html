<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Tablet Demon Hunter</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif; text-align: center; background: url('qil3.png') center/cover no-repeat fixed; padding: 20px; color:#FFFFFF; display:flex; justify-content:center; align-items:flex-end; min-height:100vh; position:relative; }

/* LAYAR */
.screen{
  display:none;              /* SEMUA layar disembunyikan dulu */
  position:fixed;
  inset:0;
  padding:20px;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.active{
  display:flex;              /* HANYA layar aktif yang muncul */
}

/* POSISI BAWAH */
.bottom{
  position:absolute;
  bottom:20px;
}

/* TOMBOL */
button{
  padding:12px 18px;
  margin:8px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  background:linear-gradient(135deg,#ff512f,#dd2476);
  color:white;
}

..option{
  width: 100%;
  max-width: 420px;
  margin: 10px auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  gap: 8px;
  height: auto;   /* penting */
}
.option img{
  max-width: 120px;
  max-height: 120px;
  object-fit: contain;
  border-radius: 10px;
}

/* WARNA JAWABAN */
.correct{ background:#2ecc71 !important; }
.wrong{ background:#e74c3c !important; }

/* KARAKTER */
.character{
  position:absolute;
  bottom:90px;
  left:30%;
  transform:translateX(-50%);
  height:290px;
  opacity:0.7;
  pointer-events:none;
}

/* HUJAN BINTANG */
.star{
  position:fixed;
  top:-20px;
  font-size:20px;
  animation:fall linear forwards;
  z-index:9999;
}

@keyframes fall{
  to{ transform:translateY(110vh); opacity:0; }
}

/* ADMIN BOLEH SCROLL */
#admin{ overflow:auto; }

/* ICON GEAR */
#gear{
  position:fixed;
  top:10px;
  right:10px;
  font-size:22px;
  cursor:pointer;
  z-index:1000;
}
#admin{
  display:none;                 /* tetap ikut sistem screen */
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;   /* mulai dari atas */
  padding:25px 15px 40px;
  overflow-y:auto;
  background: radial-gradient(circle at top, #1f1f2e, #000);
}

/* saat aktif */
#admin.active{
  display:flex;
}

/* judul */
#admin h1{
  margin-bottom:15px;
  font-size:26px;
}

/* semua form */
#admin input,
#admin textarea,
#admin select{
  width:100%;
  max-width:420px;
  margin:6px 0;
  padding:12px;
  border-radius:12px;
  border:1px solid #444;
  background:#111;
  color:#fff;
  font-size:15px;
  box-sizing:border-box;
}

/* placeholder jelas */
#admin input::placeholder,
#admin textarea::placeholder{
  color:#bbb;
  opacity:1;
}

/* tinggi textarea */
#admin textarea{
  min-height:80px;
  resize:vertical;
}

/* tombol */
#admin button{
  width:100%;
  max-width:420px;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#ff512f,#dd2476);
  color:white;
  box-shadow:0 0 10px rgba(255,80,120,0.4);
}

/* tombol reset merah */
#admin button[style*="ff3b3b"]{
  background:linear-gradient(135deg,#ff0000,#b30000);
}
/* =========================
   BACKGROUND LAYAR KUIS
   ========================= */
#quiz{
  background:
    radial-gradient(circle at center, rgba(40,0,60,0.3), rgba(0,0,0,0.6)),
    url("bg-demon.jpg");   /* ganti dengan gambar kamu */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* kotak soal supaya kontras */
#quiz-container{
  background: rgba(0,0,0,0.65);
  padding: 18px;
  border-radius: 16px;
  backdrop-filter: blur(6px);
  max-width: 420px;
  width: 100%;
}


/* =========================
   UKURAN TOMBOL DIKUNCI
   ========================= */
button{
  width: 100%;
  max-width: 420px;
  box-sizing: border-box;
  font-size: 16px;
}

/* tombol pilihan jawaban */
.bottom button{
  width: 160px;
  height: 48px;
}

/* tombol lanjut & menu bawah */
.bottom button{
  width: 160px;          /* ukuran konsisten */
  height: 48px;
}
/* =========================
   POPUP HASIL FULL LAYAR
   ========================= */
#explainBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  z-index:9999;
}

#explainBox h3{
  font-size:28px;
  margin-bottom:15px;
}

#explainBox p{
  max-width:420px;
  margin-bottom:20px;
}

#explainBox button{
  width:200px;
  height:50px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="gear">⚙️</div>

<!-- MENU -->
<div id="menu" class="screen active">
  <img src="character.png" class="character">
  <h1>Pilih Mata Pelajaran</h1>
  <div id="subjectButtons" class="bottom"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <img src="character.png" class="character">

<div id="explainBox">
  <h3 id="resultText"></h3>
  <p id="explanationText"></p>
  <button onclick="nextQuestion()">Lanjut</button>
</div>

  <h2 id="questionText"></h2>
  <div id="options"></div>
</div>

<!-- HASIL -->
<div id="result" class="screen">
  <img src="character.png" class="character">
  <h1>Skor Akhir</h1>
  <h2 id="scoreText"></h2>
  <h3 id="timeReward"></h3>

  <div class="bottom">
    <button onclick="startQuiz(currentSubject)">Ulangi</button>
    <button onclick="showScreen('menu')">Menu</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <h1>Mode Admin</h1>

  <select id="adminSubject"></select><br><br>

  <textarea id="qText" placeholder="Pertanyaan"></textarea><br>
  <input id="opt1" placeholder="Pilihan 1">
  <input id="opt2" placeholder="Pilihan 2">
  <input id="opt3" placeholder="Pilihan 3">
  <input id="opt4" placeholder="Pilihan 4"><br>
  <input id="correct" placeholder="Jawaban benar (1-4)">
  <textarea id="exp" placeholder="Penjelasan"></textarea><br>
  <button onclick="addQuestion()">Tambah Soal</button><br><br>
  
<h3>Tambah Soal Dengan Gambar (Opsional)</h3>
  <input id="imgSoal" placeholder="URL / nama file gambar soal (opsional)" />
  <br />
  <input id="img1" placeholder="Gambar opsi 1 (opsional)" />
  <input id="img2" placeholder="Gambar opsi 2 (opsional)" />
  <input id="img3" placeholder="Gambar opsi 3 (opsional)" />
  <input id="img4" placeholder="Gambar opsi 4 (opsional)" />
  <br /><br />
  
  <hr>
<hr>

<button onclick="toggleQuestionList()" style="background:#6c5ce7">
  📂 Tampilkan Soal Mapel Ini
</button>

<div id="questionArea" style="display:none; width:100%; max-width:420px;">
  <h3>Daftar Soal Mapel Ini</h3>
  <div id="questionCount"></div>
  <div id="questionList"></div>
</div>

  <input type="file" id="importFile">
  <button onclick="importJSON()">Import JSON</button><br><br>
  
  <button onclick="deleteBySubject()" style="background:#ff8800">
  🗑 Hapus Soal Mapel Ini
</button>

  <button onclick="resetAllQuestions()" style="background:#ff3b3b">
    🗑 Reset Semua Soal
  </button><br><br>

  <button onclick="showScreen('menu')">Kembali</button>
</div>

<audio id="soundCorrect" src="coret.mp3"></audio>
<audio id="soundWrong" src="incorrect.mp3"></audio>

<script>
const subjects=["Pancasila","IPAS","Matematika","Bahasa Indonesia","Bahasa Inggris","tes"];

let currentSubject=null;
let questions=[];
let index=0;
let score=0;

/* PINDAH HALAMAN */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* MENU */
function initMenu(){
  subjects.forEach(sub=>{
    const b=document.createElement("button");
    b.textContent=sub;
    b.onclick=()=>startQuiz(sub);
    subjectButtons.appendChild(b);

    const o=document.createElement("option");
    o.textContent=sub;
    adminSubject.appendChild(o);
  });
}

/* STORAGE */
function getBank(sub){
  return JSON.parse(localStorage.getItem("quiz_"+sub)||"[]");
}
function saveBank(sub,data){
  localStorage.setItem("quiz_"+sub,JSON.stringify(data));
}

/* START */
function startQuiz(sub){
  currentSubject=sub;
  questions=getBank(sub).sort(()=>Math.random()-0.5).slice(0,15);
  index=0;
  score=0;

  if(questions.length===0){ alert("Belum ada soal!"); return; }

  showScreen("quiz");
  showQuestion();
}

/* TAMPIL SOAL */
function showQuestion(){
  const q = questions[index];

  questionText.innerHTML = "";
  options.innerHTML = "";
  explainBox.style.display = "none";

  questionText.textContent = q.q;

  if(q.img){
    const img = document.createElement("img");
    img.src = q.img;
    img.style.maxWidth = "90px";
    img.style.display = "block";
    img.style.margin = "10px auto";
    questionText.appendChild(img);
  }

  q.options.forEach((opt,i)=>{
    const b = document.createElement("button");
    b.className = "option";

    if(typeof opt === "object"){
      if(opt.img){
        const img = document.createElement("img");
        img.src = opt.img;
        b.appendChild(img);
      }
      if(opt.text){
        const span = document.createElement("span");
        span.textContent = opt.text;
        b.appendChild(span);
      }
    } else {
      b.textContent = opt;
    }

    b.onclick = ()=>answer(i+1);
    options.appendChild(b);
  });
}


/* JAWAB */
function answer(choice){
  const q = questions[index];
  const btns = document.querySelectorAll(".option");

  btns.forEach(b=>b.disabled=true);
  btns[q.correct-1].classList.add("correct");

  if(choice===q.correct){
    score++;
    soundCorrect.play();
    starRain();
    resultText.textContent="🎉 BENAR!";
  }else{
    soundWrong.play();
    btns[choice-1].classList.add("wrong");
    resultText.textContent="❌ SALAH!";
  }

  explanationText.textContent = q.exp || "Tidak ada penjelasan.";

  explainBox.style.display="flex";   // tampil full layar
}

/* LANJUT */
function nextQuestion(){
  index++;
  if(index>=questions.length) return showResult();
  showQuestion();
}

/* HASIL */
function showResult(){
  const minutes=score*5;
  scoreText.textContent=score+" dari "+questions.length;
  timeReward.textContent="Hadiah: "+minutes+" menit bermain tablet";
  showScreen("result");
}

/* ADMIN */
function addQuestion(){
  const sub = adminSubject.value;
  const bank = getBank(sub);

  const newData = {
    q: qText.value,
    img: imgSoal.value || null,
    options: [
      { text: opt1.value, img: img1.value || null },
      { text: opt2.value, img: img2.value || null },
      { text: opt3.value, img: img3.value || null },
      { text: opt4.value, img: img4.value || null }
    ],
    correct: Number(correct.value),
    exp: exp.value
  };

  if(editingIndex !== null){
    bank[editingIndex] = newData;
    editingIndex = null;
    alert("Soal berhasil diupdate!");
  } else {
    bank.push(newData);
    alert("Soal ditambahkan!");
  }

  saveBank(sub,bank);
  renderQuestionList();
}

function renderQuestionList(){
  const sub = adminSubject.value;
  const bank = getBank(sub);

  questionCount.textContent = "Jumlah soal: " + bank.length;
  questionList.innerHTML = "";

  bank.forEach((q,i)=>{
    const box = document.createElement("div");
    box.style.background = "#111";
    box.style.padding = "10px";
    box.style.margin = "10px 0";
    box.style.borderRadius = "10px";
    box.style.textAlign = "left";

    const title = document.createElement("div");
    title.textContent = (i+1)+". "+q.q;
    title.style.fontWeight = "bold";
    box.appendChild(title);

    // tombol edit
    const editBtn = document.createElement("button");
    editBtn.textContent = "✏ Edit";
    editBtn.style.background = "#3498db";
    editBtn.onclick = ()=>loadQuestionToForm(i);
    box.appendChild(editBtn);

    // tombol hapus
    const delBtn = document.createElement("button");
    delBtn.textContent = "❌ Hapus";
    delBtn.style.background = "#e74c3c";
    delBtn.onclick = ()=>deleteSingleQuestion(i);
    box.appendChild(delBtn);

    questionList.appendChild(box);
  });
}
function deleteSingleQuestion(index){
  const sub = adminSubject.value;
  const bank = getBank(sub);

  if(!confirm("Hapus soal ini?")) return;

  bank.splice(index,1);
  saveBank(sub,bank);
  renderQuestionList();
}
let editingIndex = null;

function loadQuestionToForm(index){
  const sub = adminSubject.value;
  const bank = getBank(sub);
  const q = bank[index];

  qText.value = q.q;
  opt1.value = q.options[0]?.text || q.options[0];
  opt2.value = q.options[1]?.text || q.options[1];
  opt3.value = q.options[2]?.text || q.options[2];
  opt4.value = q.options[3]?.text || q.options[3];

  imgSoal.value = q.img || "";
  img1.value = q.options[0]?.img || "";
  img2.value = q.options[1]?.img || "";
  img3.value = q.options[2]?.img || "";
  img4.value = q.options[3]?.img || "";

  correct.value = q.correct;
  exp.value = q.exp || "";

  editingIndex = index;
}
function toggleQuestionList(){
  const area = document.getElementById("questionArea");
  const btn = event.target;

  if(area.style.display === "none"){
    area.style.display = "block";
    btn.textContent = "📂 Sembunyikan Soal Mapel Ini";
    renderQuestionList();
  }else{
    area.style.display = "none";
    btn.textContent = "📂 Tampilkan Soal Mapel Ini";
  }
}
function importJSON(){
  const file=importFile.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=e=>{
    const data=JSON.parse(e.target.result);
    const sub=adminSubject.value;
    saveBank(sub,getBank(sub).concat(data));
    alert("Import berhasil!");
  };
  reader.readAsText(file);
}

function deleteBySubject(){
  const sub = adminSubject.value;

  if(!confirm("Hapus semua soal untuk mapel: " + sub + " ?")) return;

  localStorage.removeItem("quiz_" + sub);

  alert("Semua soal mapel " + sub + " berhasil dihapus.");
}

function resetAllQuestions(){
  if(!confirm("Hapus semua soal?")) return;
  subjects.forEach(s=>localStorage.removeItem("quiz_"+s));
  alert("Semua soal dihapus.");
}

/* HUJAN BINTANG */
function starRain(){
  for(let i=0;i<20;i++){
    const star=document.createElement("div");
    star.className="star";
    star.textContent="⭐";
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(0.8+Math.random())+"s";
    document.body.appendChild(star);
    setTimeout(()=>star.remove(),1500);
  }
}

/* PASSWORD ADMIN */
gear.onclick=()=>{
  if(prompt("Password Admin:")==="1234") showScreen("admin");
};

adminSubject.onchange = renderQuestionList;
renderQuestionList();
initMenu();
</script>

</body>
</html>
